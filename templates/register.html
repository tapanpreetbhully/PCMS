<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - PCMS</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>

<div class="container py-5">


<div class="card shadow-lg register-card mx-auto">

    <div class="form-area">

        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="PCMS Logo"
                 class="logo">

            <h2 class="page-title mt-3">
                User Registration
            </h2>

            <p class="page-subtitle">
                Public Complaint Management System
            </p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input type="text"
                       class="form-control"
                       name="full_name"
                       pattern="[A-Za-z ]+"
                       title="Only alphabets and spaces allowed"
                       placeholder="Enter Full Name"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       class="form-control"
                       name="email"
                       placeholder="Enter Email Address"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mobile Number
                </label>

                <input type="text"
                       class="form-control"
                       name="mobile"
                       pattern="[0-9]{10}"
                       maxlength="10"
                       placeholder="Enter Mobile Number"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       minlength="6"
                       placeholder="Enter Password"
                       required>

            </div>

            <div class="form-check mb-3">

                <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                <label class="form-check-label">
                    Show Password
                </label>

            </div>

            <button type="submit"
                    class="btn btn-register text-white w-100">

                Register

            </button>

        </form>

        <div class="text-center mt-4">

            Already have an account?

            <a href="/login">
                Login Here
            </a>

        </div>

    </div>

</div>


</div>

<script>
function showPassword() {

    var x = document.getElementById("password");

    if (x.type === "password") {
        x.type = "text";
    }
    else {
        x.type = "password";
    }
}
</script>

</body>
</html>
