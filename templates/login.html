<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PCMS</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background: linear-gradient(135deg,#0d6efd,#4f8dfd);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .login-card{
        width:100%;
        max-width:650px;
        border:none;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,0.25);
        background:white;
    }

    .form-area{
        padding:35px;
    }

    .btn-login{
        background:#198754;
        border:none;
        font-size:18px;
        font-weight:bold;
        padding:12px;
    }

    .btn-login:hover{
        background:#157347;
    }

</style>


</head>

<body>

<div class="card login-card">


<div class="form-area">

    <div class="text-center mb-4">

        <img src="{{ url_for('static', filename='images/logo.png') }}"
             alt="PCMS Logo"
             width="180">

        <h2 class="text-primary mt-3">
            Public Complaint Management System
        </h2>

        <p class="text-muted">
            User & Admin Login Portal
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="Enter Email Address"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   id="password"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <div class="form-check mb-3">

            <input class="form-check-input"
                   type="checkbox"
                   onclick="showPassword()">

            <label class="form-check-label">
                Show Password
            </label>

        </div>

        <button type="submit"
                class="btn btn-login text-white w-100">
            Login
        </button>

    </form>

    <div class="text-center mt-4">

        New User?

        <a href="/register">
            Register Here
        </a>

    </div>

    <div class="alert alert-info mt-4 text-center">

        <strong>Login Information</strong><br>

        Users and Admins can login from the same page.

    </div>

</div>


</div>

<script>

function showPassword() {

    var x = document.getElementById("password");

    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}

</script>

</body>
</html>
