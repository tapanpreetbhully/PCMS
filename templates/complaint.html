<html lang="en">
<head>
    <meta charset="UTF-8">

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow-lg p-4">

    <h2 class="text-center text-primary mb-4">
        Complaint Management System
    </h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Complaint Category</label>
            <select class="form-select" name="category">
                <option>Water Supply</option>
                <option>Water Leakage</option>
                <option>Electricity</option>
                <option>Road Damage</option>
                <option>Garbage Issue</option>
                <option>Street Light</option>
                <option>Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Complaint Title</label>
            <input type="text" class="form-control" name="title" placeholder="Enter complaint title" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="5" name="description" placeholder="Describe your complaint"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" name="location" placeholder="Enter complaint location">
        </div>

        <div class="mb-3">
            <label class="form-label">Upload Image</label>
            <input type="file" class="form-control" name="image">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Submit Complaint
        </button>

    </form>

</div>


</div>

</body>
</html>
